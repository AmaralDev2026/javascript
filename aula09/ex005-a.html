<!DOCTYPE html>
<html lang="ptbr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiros passos com DOM</title>
    <style>
        body {
    background: rgb(68, 125, 199);
    color: white;
    font: normal 18pt Arial;
}
    </style>
</head>
<body>
    <h1>Iniciando estudos DOM</h1>
    <p>aqui vai o resultado</p>
    <p>Aprendendo a usar o <strong>DOM</strong> em JavaScript</p>
    <div id="msg">Clique em mim</div>
    <script>
        var p1 = window.document.getElementsByTagName('p')[0]
        p1.style.background = 'yellow'

        /*var d = window.document.getElementById('msg')*/
        
        var c = window.document.querySelector('div#msg')
        c.style.background = 'blue'

    </script>
</body>
</html>
<!--seleção de elementos:
Marca  => getElementsByTagName()[]
Por ID => getElementById()
Nome   => getElementsByName()[]
Classe => getElementsByClassName()[]
Detalhe quando o "Element" estiver com final "s" necessário colocar "[]" para selecionar qual?

querySelector()
querySelectorAll()
-->
