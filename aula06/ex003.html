<html lang="pt-br">

        body {
            background-color: rgba(105, 105, 173);

<body>
    <h1>Olá, Mundo!!</h1>
    <p>Já me livrei da maldição</p>
    <script>
        var n1 = Number.parseInt(window.prompt('Digite um número: ')) //string
        var n2 = Number.parseInt(window.prompt('Digite outro ´número: ')) //string
    //var n1 = Number(window.prompt('Digite um número: ')) modo simplificado
        var s = n1 + n2 
        //window.alert('A soma dos valores é: ' + s) //concatenação
        window.alert(`A soma entre ${n1} e ${n2} é igual a ${s}`)// neste caso se usa ( ` ` ) crase de acentos
        // (number + number) para adição
        // (string + string) para concatenação
        // Number.parseInt - converte string em número Inteiro
        // Number.parseFloat - converte string em número com ponto  - flutuante
        // Number  -- o javascript faz a converção baseado nos valores digitados
    </script>
